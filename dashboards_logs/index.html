<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Logs</title>
  <style>
    body {
      font-family: 'Geist Variable', sans-serif;
      background-color: #D1CCBD; /* Fondo beige */
      color: #001B71; /* Texto azul profundo */
      text-align: center;
      margin: 0;
      padding: 50px;
    }
    h1 {
      color: #001B71;
    }
    p {
      color: #2B5597;
    }
    a {
      display: inline-block;
      margin: 10px;
      padding: 12px 24px;
      background-color: #2B5597; /* Botón azul medio */
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    a:hover {
      background-color: #62CBC9; /* Hover con acento */
      color: #001B71;
    }
  </style>
</head>
<body>
  <h1>Bienvenido al Portal de Logs</h1>
  <p>Selecciona una opción:</p>
  <a href="funcion_logs/index.html">Función Logs</a>
  <a href="dashboards_logs/index.html">Dashboard Logs</a>
</body>
</html>

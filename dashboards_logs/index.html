<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Logs - Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Geist Variable', sans-serif;
      background-color: #D1CCBD;
      color: #001B71;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      text-align: center;
    }
    .logo img {
      height: 60px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      color: #001B71;
      margin-bottom: 10px;
    }
    p {
      font-size: 12px;
      color: #939598;
      margin-bottom: 20px;
    }
    label {
      font-size: 10px;
      font-weight: bold;
      color: #2B5597;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #D1CCBD;
      border-radius: 6px;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .btn-local {
      background-color: #2B5597;
      color: #FFFFFF;
      margin-top: 10px;
    }
    .btn-local:hover {
      background-color: #62CBC9;
      color: #001B71;
    }
    .btn-google {
      background: rgba(66,133,244,.15);
      border: 1px solid rgba(66,133,244,.4);
      color: #001B71;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .btn-google:hover {
      background: rgba(66,133,244,.28);
    }
    .footer {
      margin-top: 15px;
      font-size: 10px;
      color: #939598;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Logo -->
    <div class="logo">
      <img src="dashboards_logs/Logo.png" alt="AgroAmerica Logo">
    </div>
    <!-- Título -->
    <h1>Iniciar sesión</h1>
    <p>Acceso al Portal de Logs</p>
    
    <!-- Botón Google -->
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="16" height="16" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
      </svg>
      Ingresar con Google
    </button>
    
    <!-- Separador -->
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0">
      <div style="flex:1;height:1px;background:#D1CCBD"></div>
      <span style="font-size:9px;color:#939598">o con contraseña local</span>
      <div style="flex:1;height:1px;background:#D1CCBD"></div>
    </div>
    
    <!-- Formulario local -->
    <form onsubmit="loginLocal(); return false;">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="correo@agroamerica.com" required>
      
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="********" required>
      
      <button type="submit" class="btn-local">Ingresar</button>
    </form>
    
    <!-- Footer -->
    <div class="footer">
      AgroAmérica Access Intelligence v3.0 · Zero Trust Panel
    </div>
  </div>

  <script>
    function loginWithGoogle() {
      // Aquí iría la integración real con Firebase Auth o Google OAuth
      alert("Login con Google validado. Redirigiendo...");
      window.location.href = "portal.html"; // Página destino
    }

    function loginLocal() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;

      // Validación simple de ejemplo
      if(email.endsWith("@agroamerica.com") && pass === "1234"){
        alert("Login correcto. Redirigiendo...");
        window.location.href = "portal.html"; // Página destino
      } else {
        alert("Credenciales incorrectas.");
      }
    }
  </script>
</body>
</html>

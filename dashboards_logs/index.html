<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Logs</title>
  <style>
    body {
      margin: 0;
      font-family: 'Geist Variable', sans-serif;
      background-color: #D1CCBD;
      color: #001B71;
    }
    /* Barra de navegación */
    nav {
      background-color: #001B71; /* Azul profundo */
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .logo img {
      height: 45px; /* Ajusta el tamaño del logo */
    }
    nav .title {
      color: #FFFFFF;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      flex-grow: 1; /* Ocupa el espacio central */
    }
    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }
    nav ul li {
      margin-left: 20px;
    }
    nav ul li a {
      text-decoration: none;
      color: #FFFFFF;
      font-weight: bold;
      transition: color 0.3s ease, background-color 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }
    nav ul li a:hover {
      background-color: #2B5597; /* Azul medio */
      color: #D1CCBD; /* Beige contraste */
    }
    /* Contenido principal */
    .content {
      text-align: center;
      padding: 50px;
    }
    .content h1 {
      margin-bottom: 20px;
    }
    .content a {
      display: inline-block;
      margin: 10px;
      padding: 12px 24px;
      background-color: #2B5597;
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .content a:hover {
      background-color: #62CBC9;
      color: #001B71;
    }
  </style>
</head>
<body>
  <!-- Barra de navegación -->
  <nav>
    <div class="logo">
      <!-- Ruta exacta al logo dentro de dashboards_logs -->
      <img src="dashboards_logs/Logo.png" alt="AgroAmerica Logo">
    </div>
    <div class="title">Iniciar Sesión</div>
   
  </nav>

  <!</style>
</head>
<body>

<!-- ══════ PANTALLA DE LOGIN ══════ -->
<body>
  <div class="login-container">
    <!-- Logo -->
    
    <!-- Título -->
    <Center>
    <p>Acceso al Portal de Logs</p>
    
    <!-- Formulario -->
    <form>
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="correo@agroamerica.com" required>
      
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="********" required>
      
      <button type="submit">Ingresar</button>
 <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="16" height="16" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
      </svg>
      Ingresar con Google
    </button>
      
    </form>
    
    <!-- Footer -->
    <div class="footer">
      AgroAmérica Access Intelligence v3.0 · Zero Trust Panel
      </Center>
    </div>
  </div>
</body>
 
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visor de Logs Fortinet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    #logInput {
      margin: 20px 0;
      display: block;
    }
    #logOutput {
      white-space: pre-wrap;
      background: #222;
      color: #0f0;
      padding: 15px;
      border-radius: 5px;
      height: 400px;
      overflow-y: scroll;
    }
  </style>
</head>
<body>
  <h1>Visor de Logs Fortinet</h1>
  
  <input type="file" id="logInput" accept=".log,.txt">
  
  <div id="logOutput">Selecciona un archivo de logs...</div>
  
  <script>
    const input = document.getElementById('logInput');
    const output = document.getElementById('logOutput');

    input.addEventListener('change', () => {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          output.textContent = e.target.result;
        };
        reader.readAsText(file);
      }
    });
  </script>
</body>
</html>
